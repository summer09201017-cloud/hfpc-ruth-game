# 保羅大富翁 — 持續整合（CI）
# 每次 push 到 main 或開 PR 時自動跑，保護老師對 journey1.json 的內容編輯。
# Node 版本釘在 20，與 netlify.toml 一致（vite-plugin-pwa 的 Workbox 在 Node 24 不穩）。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- 快速關卡：內容驗證 + 純引擎自我對戰 + 打包，全部很快、零瀏覽器 ----
  test:
    name: 內容驗證 + 自我對戰 + 打包
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 安裝套件
        run: npm ci

      - name: 驗證遊戲內容（全部 journey*.json）
        run: npm run validate

      - name: 純引擎自我對戰（1~4 人 × 300 種子）
        run: npm run test:selfplay

      - name: 煙霧測試（語法 + 嵌入契約）
        run: node scripts/smoke-test.mjs

      - name: 打包（確認可正常 build）
        run: npm run build

  # ---- 較重的關卡：用真實瀏覽器把一整場玩完，抓動畫/算繪/卡死類 bug ----
  browser:
    name: 瀏覽器實機測試（Playwright）
    needs: test            # 快速關卡先過，才花時間跑瀏覽器
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: 安裝套件
        run: npm ci

      - name: 打包
        run: npm run build

      - name: 安裝 Playwright 瀏覽器（chromium）
        run: npx playwright install --with-deps chromium

      - name: 背景啟動 preview 伺服器
        run: npm run preview &

      - name: 等待 preview 伺服器就緒
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:4173/ >/dev/null 2>&1; then
              echo "preview server is up"
              exit 0
            fi
            sleep 1
          done
          echo "preview server 在 30 秒內沒有起來"
          exit 1

      - name: 瀏覽器實機跑一整場
        run: npm run test:browser
        env:
          URL: http://localhost:4173/
